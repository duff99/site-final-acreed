services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "127.0.0.1:8888:80"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - db-data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/acreed.db
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_NAME=${ADMIN_NAME:-Admin}
      - CORS_ORIGIN=https://site.acreedconsulting.com
      - SMTP_HOST=${SMTP_HOST:-smtp.office365.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - NOTIFY_EMAIL_FROM=${NOTIFY_EMAIL_FROM}
      - NOTIFY_EMAIL_CONTACT=${NOTIFY_EMAIL_CONTACT:-contact@acreedconsulting.com}
      - NOTIFY_EMAIL_RECRUITMENT=${NOTIFY_EMAIL_RECRUITMENT:-recrutement@acreedconsulting.com}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  db-data:

networks:
  default:
    name: acreed-prod
    external: true
