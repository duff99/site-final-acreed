server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security response headers — applied on every response served by this
    # nginx (the SPA frontend container). The host nginx terminates TLS in
    # front of this one and is the right place for HSTS; everything below is
    # safe to apply at the app layer.
    #
    # CSP runs in Report-Only mode for now: violations show up in the
    # browser console and (later) in a reporting endpoint, but nothing is
    # blocked. Once the policy stabilizes (~1 week of observation), flip
    # `Content-Security-Policy-Report-Only` to `Content-Security-Policy`.
    # Inline styles + 'unsafe-inline' are required by Tailwind/Framer
    # Motion runtime style injection; tightening that needs a hash/nonce
    # pipeline that's a separate refactor.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self'; media-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
