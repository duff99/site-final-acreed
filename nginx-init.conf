# Temporary config for initial certificate setup (HTTP only)
server {
    listen 80;
    server_name site.acreedconsulting.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Acreed Consulting - SSL setup in progress...';
        add_header Content-Type text/plain;
    }
}
