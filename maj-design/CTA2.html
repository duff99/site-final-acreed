<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call To Action - Frameless Premium</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-color: #0A0A0A;
            --accent-color: #e2d4bc;
            --primary-white: #ffffff;
            --muted-white: rgba(255, 255, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- CONTENEUR SANS CADRE --- */
        .frameless-cta {
            position: relative;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 100px 20px;
            overflow: hidden;
        }

        /* --- ORBE LUMINEUSE EN MOUVEMENT --- */
        .ambient-orb {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(226, 212, 188, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(50px);
            z-index: 0;
            pointer-events: none;
            /* Animation de flottement lente */
            animation: floatOrb 12s ease-in-out infinite alternate;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(-10%, -10%) scale(0.8);
            }

            50% {
                transform: translate(10%, 15%) scale(1.1);
            }

            100% {
                transform: translate(-15%, 5%) scale(0.9);
            }
        }

        /* --- CONTENU --- */
        .cta-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Sur-titre minimaliste */
        .cta-eyebrow {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--muted-white);
            margin-bottom: 40px;
        }

        /* Petit point doré devant le sur-titre */
        .cta-eyebrow::before {
            content: '';
            width: 4px;
            height: 4px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
        }

        /* Titre Principal */
        .cta-title {
            font-weight: 300;
            /* Très fin pour la partie "Prêt à transformer" */
            font-size: 52px;
            line-height: 1.1;
            letter-spacing: -1px;
            margin-bottom: 40px;
            color: var(--primary-white);
        }

        /* Partie Italique / Or */
        .cta-title em {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 96px;
            /* Dimension démesurée assumée */
            font-weight: 400;
            color: var(--accent-color);
            margin-top: 10px;
            padding-right: 20px;
            /* Compense l'italique pour le centrage */
            text-shadow: 0 15px 40px rgba(226, 212, 188, 0.15);
        }

        .cta-desc {
            font-size: 17px;
            color: var(--muted-white);
            max-width: 550px;
            line-height: 1.7;
            margin-bottom: 60px;
            font-weight: 300;
        }

        /* --- ACTIONS (Boutons premium) --- */
        .cta-actions {
            display: flex;
            align-items: center;
            gap: 40px;
        }

        /* Bouton Primaire : Massif mais épuré */
        .btn-primary {
            background-color: var(--primary-white);
            color: #000;
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 40px -10px rgba(255, 255, 255, 0.25);
        }

        /* Bouton Secondaire : Lien souligné animé (très luxe) */
        .btn-text {
            color: var(--primary-white);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            text-decoration: none;
            position: relative;
            padding-bottom: 6px;
            transition: color 0.3s ease;
        }

        .btn-text::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: var(--accent-color);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .btn-text:hover {
            color: var(--accent-color);
        }

        .btn-text:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .cta-title {
                font-size: 36px;
            }

            .cta-title em {
                font-size: 56px;
                padding-right: 0;
            }

            .cta-actions {
                flex-direction: column;
                gap: 25px;
            }

            .btn-primary {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <section class="frameless-cta">

        <div class="ambient-orb"></div>

        <div class="cta-content">
            <span class="cta-eyebrow">Parlons-en</span>

            <h2 class="cta-title">
                Prêt à transformer
                <em>votre carrière ?</em>
            </h2>

            <p class="cta-desc">
                Consultants, entreprises : construisons ensemble votre succès avec exigence et transparence.
            </p>

            <div class="cta-actions">
                <a href="#offres" class="btn-primary">Voir les offres</a>
                <a href="#contact" class="btn-text">Nous contacter</a>
            </div>
        </div>

    </section>

</body>

</html>
