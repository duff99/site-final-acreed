<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acreed - Archer Premium Hero (Sans Menu)</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-color: #0A0A0A;
            --accent-color: #e2d4bc;
            /* Or/Beige */
            --primary-white: #ffffff;
            --muted-white: rgba(255, 255, 255, 0.6);
            --grid-line: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--primary-white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- HERO SECTION --- */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- BACKGROUND VIDEO --- */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-color: #000;
        }

        .background-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Force l'alignement sur la gauche pour toujours voir l'archer */
            object-position: left center;
        }

        /* Dégradé : 100% transparent à gauche (sur l'archer), noir profond à droite (sous le texte) */
        .video-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, transparent 30%, rgba(10, 10, 10, 0.8) 60%, rgba(10, 10, 10, 1) 100%);
            z-index: 1;
        }

        /* --- LAYOUT DROIT (Le Contenu) --- */
        .hero-layout {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            /* Pousse le contenu vers la droite de l'écran */
            justify-content: flex-end;
            padding: 0 8%;
        }

        .hero-content-block {
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            /* Aligné à gauche par rapport à sa propre boîte */
        }

        .sur-title {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--accent-color);
            margin-bottom: 25px;
        }

        .sur-title .line {
            width: 50px;
            height: 1px;
            background-color: var(--accent-color);
        }

        /* Typographie massive */
        .main-title {
            font-weight: 300;
            font-size: 85px;
            line-height: 0.9;
            letter-spacing: -2px;
            color: var(--primary-white);
            margin-bottom: 30px;
        }

        .main-title em {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 130px;
            font-weight: 400;
            color: var(--accent-color);
            margin-top: -10px;
            padding-left: 0px;
            text-shadow: 0 10px 40px rgba(226, 212, 188, 0.1);
        }

        .hero-desc {
            font-size: 16px;
            line-height: 1.8;
            color: var(--muted-white);
            font-weight: 300;
            max-width: 480px;
            margin-bottom: 45px;
        }

        /* --- BOUTON UNIQUE PREMIUM --- */
        .btn-premium {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 45px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent-color);
            background-color: rgba(10, 10, 10, 0.6);
            border: 1px solid var(--accent-color);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .btn-premium i {
            font-size: 18px;
            transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .btn-premium:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(226, 212, 188, 0.2);
        }

        .btn-premium:hover i {
            transform: translateX(6px);
        }

        /* --- COMPACT KPI DOCK (Intégré sous le bouton) --- */
        .kpi-mini-grid {
            display: flex;
            gap: 50px;
            margin-top: 70px;
            padding-top: 40px;
            border-top: 1px solid var(--grid-line);
            width: 100%;
        }

        .kpi-item {
            display: flex;
            flex-direction: column;
        }

        .kpi-val {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-style: italic;
            color: var(--primary-white);
            line-height: 1;
            margin-bottom: 5px;
        }

        .kpi-val .plus {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            font-style: normal;
            color: var(--accent-color);
        }

        .kpi-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted-white);
        }

        /* --- ANIMATIONS --- */
        .animate-fade {
            opacity: 0;
            transform: translateX(30px);
            /* L'animation vient de la droite */
            animation: fadeInRight 1s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        .delay-1 {
            animation-delay: 0.1s;
        }

        .delay-2 {
            animation-delay: 0.3s;
        }

        .delay-3 {
            animation-delay: 0.5s;
        }

        .delay-4 {
            animation-delay: 0.7s;
        }

        @keyframes fadeInRight {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 1200px) {
            .main-title {
                font-size: 65px;
            }

            .main-title em {
                font-size: 100px;
            }
        }

        @media (max-width: 900px) {
            .hero-layout {
                justify-content: center;
                align-items: flex-end;
                padding-bottom: 80px;
            }

            /* Sur mobile, on remet le texte en bas pour voir l'archer en haut */
            .video-overlay {
                background: linear-gradient(180deg, transparent 0%, rgba(10, 10, 10, 0.8) 50%, rgba(10, 10, 10, 1) 100%);
            }

            .hero-content-block {
                align-items: center;
                text-align: center;
            }

            .sur-title {
                justify-content: center;
            }

            .main-title {
                font-size: 50px;
            }

            .main-title em {
                font-size: 80px;
            }

            .kpi-mini-grid {
                justify-content: center;
                gap: 30px;
            }
        }
    </style>
</head>

<body>

    <header class="hero-section">

        <div class="video-container">
            <div class="video-overlay"></div>
            <video class="background-video" autoplay loop muted playsinline>
                <source src="hero-video.mp4" type="video/mp4">
            </video>
        </div>

        <div class="hero-layout">
            <div class="hero-content-block">

                <div class="sur-title animate-fade delay-1">
                    <div class="line"></div> Recrutement & Conseil
                </div>

                <h1 class="main-title animate-fade delay-2">
                    Fantastique
                    <em>simplicité</em>
                </h1>

                <p class="hero-desc animate-fade delay-3">
                    Nous plaçons les meilleurs consultants auprès des leaders du marché. Simplicité, transparence
                    et excellence.
                </p>

                <div class="animate-fade delay-3">
                    <a href="#contact" class="btn-premium">
                        Nous contacter
                        <i class="ph ph-arrow-right"></i>
                    </a>
                </div>

                <div class="kpi-mini-grid animate-fade delay-4">
                    <div class="kpi-item">
                        <span class="kpi-val">30<span class="plus">+</span></span>
                        <span class="kpi-label">Experts</span>
                    </div>
                    <div class="kpi-item">
                        <span class="kpi-val">10<span class="plus">+</span></span>
                        <span class="kpi-label">Clients</span>
                    </div>
                    <div class="kpi-item">
                        <span class="kpi-val">98<span class="plus">%</span></span>
                        <span class="kpi-label">Satisfaction</span>
                    </div>
                </div>

            </div>
        </div>

    </header>

</body>

</html>
