<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acreed - Minimalist Footer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-color: #0A0A0A;
            --accent-color: #e2d4bc;
            --primary-white: #ffffff;
            --muted-white: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            /* Pour la démo, on simule le bas de page */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- SÉPARATEUR FLUIDE --- */
        /* Remplace la bordure dure par un dégradé qui s'efface sur les bords */
        .footer-divider {
            width: 100%;
            max-width: 800px;
            height: 1px;
            margin: 0 auto;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
        }

        /* --- FOOTER CONTAINER --- */
        .minimal-footer {
            margin-top: auto;
            padding: 80px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* --- LOGO & SIGNATURE --- */
        .footer-brand {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            font-size: 18px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--primary-white);
            margin-bottom: 12px;
        }

        .footer-logo i {
            font-size: 28px;
            color: var(--accent-color);
        }

        .footer-signature {
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-style: italic;
            color: var(--accent-color);
            opacity: 0.8;
            letter-spacing: 1px;
        }

        /* --- NAVIGATION EN LIGNE --- */
        .footer-nav {
            display: flex;
            gap: 40px;
            margin-bottom: 60px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .footer-nav a {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted-white);
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .footer-nav a i {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.3);
            transition: color 0.3s ease;
        }

        .footer-nav a:hover {
            color: var(--primary-white);
            transform: translateY(-2px);
        }

        .footer-nav a:hover i {
            color: var(--accent-color);
        }

        /* --- LÉGAL & COPYRIGHT --- */
        .footer-legal {
            color: rgba(255, 255, 255, 0.25);
            font-size: 11px;
            letter-spacing: 1px;
            line-height: 1.8;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 600px) {
            .footer-nav {
                flex-direction: column;
                gap: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="footer-divider"></div>

    <footer class="minimal-footer">

        <div class="footer-brand">
            <div class="footer-logo">
                <i class="ph ph-target"></i> ACREED
            </div>
            <div class="footer-signature">L'exigence au service de votre trajectoire.</div>
        </div>

        <nav class="footer-nav">
            <a href="mailto:contact@acreedconsulting.com">
                <i class="ph ph-envelope-simple"></i> Contact
            </a>
            <a href="https://linkedin.com" target="_blank">
                <i class="ph ph-linkedin-logo"></i> LinkedIn
            </a>
            <a href="#">Mentions Légales</a>
            <a href="#">Confidentialité</a>
            <a href="#">CGV</a>
        </nav>

        <div class="footer-legal">
            <span>© 2026 Acreed Consulting. Tous droits réservés.</span>
            <span>Le Puy-en-Velay, France</span>
        </div>

    </footer>

</body>

</html>
